        a[href*="gn-math"],

            display: none !important;
        }
    </style>

    <script>
        // Surgical cleanup: Only removes the specific text, not parent containers
        const cleanSpecificText = () => {
            // 1. Remove all links going to those sites
            const links = document.querySelectorAll('a[href*="gn-math"]');
            links.forEach(link => link.remove());

            // 2. Find and remove the specific "Fixed up by" text nodes
            const walkers = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let node;
            const nodesToRemove = [];
            while (node = walkers.nextNode()) {
                if (node.textContent.includes('Fixed up by') || node.textContent.includes('gn-math')) {
                    nodesToRemove.push(node);
                }
            }
            nodesToRemove.forEach(textNode => {
                if (textNode.parentElement) {
                    // If the parent is just a small wrapper (like a span or small div), remove it
                    // Otherwise, just clear the text so the menu stays
                    if (textNode.parentElement.children.length === 0) {
                        textNode.parentElement.remove();
                    } else {
                        textNode.textContent = "";
                    }
                }
            });
        };

        const observer = new MutationObserver(cleanSpecificText);
        observer.observe(document.documentElement, { childList: true, subtree: true });
    </script>

        const ogfetch = window.fetch;

                input = input.replace("vps.kodub.com", "vpskodub.tmena1565.workers.dev");
            } else if (input instanceof Request) {

            return ogfetch(input, init);

        const ogxml = XMLHttpRequest.prototype.open;

            if (typeof url === "string") {
                url = url.replace("vps.kodub.com", "vpskodub.tmena1565.workers.dev");

            return ogxml.call(this, method, url, ...rest);
